[build]
  command = "pip install -r requirements.txt && python -m spacy download en_core_web_sm"

[build.environment]
  PYTHON_VERSION = "3.11"

[[build.packages]]
  name = "tesseract-ocr"

[[build.packages]]
  name = "tesseract-ocr-eng"

[deploy]
  command = "uvicorn src.main:app --host 0.0.0.0 --port $PORT"

[deploy.environment]
  PORT = "8000"
